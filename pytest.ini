[pytest]
# Only collect the real suite. Root-level test_order.py / test_connection.py
# are manual dev scripts that hit LIVE Kite at import — collecting them makes
# `pytest` flaky (TokenExpiredError during collection) and pollutes coverage.
testpaths = tests

[coverage:run]
# Production-code coverage: exclude the suite itself, manual dev scripts, and
# one-off maintenance scripts so the number reflects shipped logic.
omit =
    tests/*
    test_order.py
    test_connection.py
    scripts/*
    main.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if __name__ == .__main__.:
